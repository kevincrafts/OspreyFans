<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OspreyFans - The Internet's Wildest Feathered Content</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&amp;family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto Condensed', sans-serif;
  /* Specify the image path */
  background-image: url('https://cdn.statically.io/gh/kevincrafts/OspreyFans@main/of-vert.jpg');
  @media screen and (min-width: 960px) {
    background-image: url('https://cdn.statically.io/gh/kevincrafts/OspreyFans@main/of-wide.jpg');
  }


  /* Scale the image to cover the entire container */
  background-size: cover;

  /* Center the image horizontally and vertically */
  background-position: center center;

  /* Prevent the image from repeating if it's smaller than the screen */
  background-repeat: no-repeat;

  /* (Optional) Keep the background fixed during scroll */
  background-attachment: fixed;

  /* Ensure the body fills the entire viewport height */
  min-height: 100vh;
  margin: 0;
}
    .container {
      padding:40px;
      min-height: 100vh;
      display:flex;
      
    }
    @media screen and (min-width: 960px) {
      .container {
        align-items: center;
      }
    }
    .content {
      color:#fff;
    }
    h1 {
      font-size: 72px;
    }
    h1, h2 {
      margin:0;
      padding:0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1><span class="w1">Osprey</span><span class="w2">Fans</span></h1>
    <h2>The Internet's <strong></strong>Wildest Feathered Content</strong>.</h2>
    </div>
  </div>
  
</body>
</html>
