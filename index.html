<head>

    body {
  /* Specify the image path */

  /* Scale the image to cover the entire container */

  /* Center the image horizontally and vertically */
  background-position: center center;

  /* Prevent the image from repeating if it's smaller than the screen */
  background-repeat: no-repeat;

  /* (Optional) Keep the background fixed during scroll */
  background-attachment: fixed;

  /* Ensure the body fills the entire viewport height */
  min-height: 100vh;
  margin: 0;
}

</head>
